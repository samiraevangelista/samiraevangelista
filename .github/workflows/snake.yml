name: Generate Snake Neon Purple

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        with:
          github_user_name: samiraevangelista
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#d8b4fe&color_dots=#0d1117,#3b0764,#6d28d9,#a855f7,#e9d5ff

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

